spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8083/login/oauth2/code/google

app.external.openai.api-key=test
app.external.openai.model=gpt-4o-mini
app.external.whisper.api-url=https://api.openai.com/v1/audio/transcriptions
app.external.toss.secret-key=test
app.external.toss.client-key=test
app.external.google.calendar-client-id=test
app.external.google.calendar-client-secret=test

app.upload.storage-path=./storage/uploads
app.upload.limit.free.max-file-size-bytes=52428800
app.upload.limit.pro.max-file-size-bytes=209715200
app.upload.limit.free.monthly-count=20
app.upload.limit.pro.monthly-count=200

app.async.meeting.core-pool-size=2
app.async.meeting.max-pool-size=8
app.async.meeting.queue-capacity=100