spring.application.name=momatic
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar.events
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8083/login/oauth2/code/google}

app.external.openai.api-key=${OPENAI_API_KEY}
app.external.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.external.whisper.api-url=${WHISPER_API_URL:https://api.openai.com/v1/audio/transcriptions}
app.external.toss.secret-key=${TOSS_PAYMENTS_SECRET_KEY}
app.external.toss.client-key=${TOSS_PAYMENTS_CLIENT_KEY}
app.external.google.calendar-client-id=${GOOGLE_CLIENT_ID}
app.external.google.calendar-client-secret=${GOOGLE_CLIENT_SECRET}