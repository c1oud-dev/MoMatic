spring.application.name=momatic
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar.events
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8083/login/oauth2/code/google}

app.external.openai.api-key=${OPENAI_API_KEY}
app.external.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.external.whisper.api-url=${WHISPER_API_URL:https://api.openai.com/v1/audio/transcriptions}
app.external.toss.secret-key=${TOSS_PAYMENTS_SECRET_KEY}
app.external.toss.client-key=${TOSS_PAYMENTS_CLIENT_KEY}
app.external.google.calendar-client-id=${GOOGLE_CLIENT_ID}
app.external.google.calendar-client-secret=${GOOGLE_CLIENT_SECRET}
app.upload.storage-path=${APP_UPLOAD_STORAGE_PATH:./storage/uploads}
app.upload.limit.free.max-file-size-bytes=${APP_UPLOAD_LIMIT_FREE_MAX_FILE_SIZE_BYTES:52428800}
app.upload.limit.pro.max-file-size-bytes=${APP_UPLOAD_LIMIT_PRO_MAX_FILE_SIZE_BYTES:209715200}
app.upload.limit.free.monthly-count=${APP_UPLOAD_LIMIT_FREE_MONTHLY_COUNT:20}
app.upload.limit.pro.monthly-count=${APP_UPLOAD_LIMIT_PRO_MONTHLY_COUNT:200}

app.async.meeting.core-pool-size=${APP_ASYNC_MEETING_CORE_POOL_SIZE:2}
app.async.meeting.max-pool-size=${APP_ASYNC_MEETING_MAX_POOL_SIZE:8}
app.async.meeting.queue-capacity=${APP_ASYNC_MEETING_QUEUE_CAPACITY:100}