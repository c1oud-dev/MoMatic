<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>MoMatic 팀 초대</title>
</head>
<body>
<h1>MoMatic 팀 초대</h1>
<p>
  <strong th:text="${inviterName}">초대자</strong>님이
  <strong th:text="${teamName}">팀</strong> 팀으로 초대했습니다.
</p>
<p>
  아래 링크를 눌러 팀에 참여해 주세요.
</p>
<p>
  <a th:href="${joinUrl}" th:text="${joinUrl}">초대 링크</a>
</p>
<p>
  이 초대는 <span th:text="${expiredAt}">만료일</span>까지 유효합니다.
</p>
</body>
</html>
