<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>관리자 구독 현황</title>
</head>
<body>
<div th:replace="~{layouts/default :: layout(~{::section})}">
    <section>
        <header>
            <h1>구독 현황</h1>
            <a th:href="@{/admin/users}">사용자 목록</a>
        </header>

        <p th:if="${subscriptions.empty}">등록된 구독이 없습니다.</p>
        <table th:unless="${subscriptions.empty}">
            <thead>
            <tr>
                <th scope="col">사용자 이메일</th>
                <th scope="col">플랜</th>
                <th scope="col">상태</th>
                <th scope="col">시작일</th>
                <th scope="col">만료일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="subscription : ${subscriptions.content}">
                <td th:text="${subscription.userEmail}">user@example.com</td>
                <td th:text="${subscription.planType}">PRO</td>
                <td th:text="${subscription.status}">ACTIVE</td>
                <td th:text="${subscription.startedAt == null} ? '-' : ${#temporals.format(subscription.startedAt, 'yyyy-MM-dd HH:mm')}">2026-06-01 00:00</td>
                <td th:text="${subscription.expiredAt == null} ? '-' : ${#temporals.format(subscription.expiredAt, 'yyyy-MM-dd HH:mm')}">-</td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${subscriptions.totalPages > 1}" aria-label="구독 현황 페이지 이동">
            <a th:if="${subscriptions.hasPrevious()}"
               th:href="@{/admin/subscriptions(page=${subscriptions.number - 1})}">이전</a>
            <span th:text="|${subscriptions.number + 1} / ${subscriptions.totalPages}|">1 / 1</span>
            <a th:if="${subscriptions.hasNext()}"
               th:href="@{/admin/subscriptions(page=${subscriptions.number + 1})}">다음</a>
        </nav>
    </section>
</div>
</body>
</html>
