<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>회의록 상세</title>
  <style>
    .status-badge {
        border-radius: 999px;
        display: inline-block;
        padding: 0.2rem 0.6rem;
    }
    .status-pending,
    .status-processing {
        background: #fff3cd;
    }
    .status-completed {
        background: #d1e7dd;
    }
    .status-failed {
        background: #f8d7da;
    }
  </style>
</head>
<body>
<div th:replace="~{layouts/default :: layout(~{::section})}">
  <section>
    <header>
      <a th:href="@{/meetings}">목록으로</a>
      <h1 th:text="${detail.meeting.title}">회의 제목</h1>
      <span th:text="${detail.meeting.status}"
            th:class="|status-badge status-${#strings.toLowerCase(detail.meeting.status.name())}|">
                COMPLETED
            </span>
    </header>

    <section>
      <h2>요약</h2>
      <p th:if="${#strings.isEmpty(detail.meeting.summary)}">아직 생성된 요약이 없습니다.</p>
      <p th:unless="${#strings.isEmpty(detail.meeting.summary)}"
         th:text="${detail.meeting.summary}">회의 요약</p>
    </section>

    <section>
      <h2>전사 내용</h2>
      <p th:if="${#lists.isEmpty(detail.transcripts)}">아직 생성된 전사 내용이 없습니다.</p>
      <ol th:unless="${#lists.isEmpty(detail.transcripts)}">
        <li th:each="transcript : ${detail.transcripts}">
          <strong th:text="${transcript.speaker}">화자</strong>
          <span th:text="${transcript.content}">전사 내용</span>
        </li>
      </ol>
    </section>

    <section>
      <h2>액션 아이템</h2>
      <p th:if="${#lists.isEmpty(detail.actionItems)}">등록된 액션 아이템이 없습니다.</p>
      <ul th:unless="${#lists.isEmpty(detail.actionItems)}">
        <li th:each="actionItem : ${detail.actionItems}">
          <span th:text="${actionItem.task}">할 일</span>
          <span th:if="${!#strings.isEmpty(actionItem.assignee)}"
                th:text="|담당: ${actionItem.assignee}|">담당자</span>
          <span th:text="${actionItem.status}">TODO</span>
        </li>
      </ul>
    </section>
  </section>
</div>
</body>
</html>
