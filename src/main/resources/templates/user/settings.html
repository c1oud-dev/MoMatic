<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>사용자 설정</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>
<body>
<div th:replace="~{layouts/default :: layout(~{::section})}">
    <section>
        <header>
            <h1>사용자 설정</h1>
        </header>

        <section>
            <h2>회원 탈퇴</h2>
            <p>회원 탈퇴 시 계정, 결제 이력, 사용량 기록, 회의록과 업로드 파일이 영구 삭제됩니다.</p>
            <p>삭제된 데이터는 복구할 수 없습니다.</p>
            <button type="button" id="delete-account-button">회원 탈퇴</button>
        </section>
    </section>
</div>
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const deleteAccountButton = document.getElementById('delete-account-button');

    deleteAccountButton.addEventListener('click', async () => {
        if (!window.confirm('정말 회원 탈퇴하시겠습니까? 삭제된 데이터는 복구할 수 없습니다.')) {
            return;
        }

        deleteAccountButton.disabled = true;

        try {
            const response = await fetch('/users/me', {
                method: 'DELETE',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest',
                    [csrfHeader]: csrfToken
                }
            });

            if (!response.ok) {
                throw new Error('회원 탈퇴에 실패했습니다.');
            }

            window.location.href = '/';
        } catch (error) {
            window.alert(error.message);
            deleteAccountButton.disabled = false;
        }
    });
</script>
</body>
</html>
